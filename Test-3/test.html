<!Doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>김하늘 포트폴리오</title>

    <style>
    /* ── 전체 초기화 ── */
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    }

    body {
    font-family: 'Malgun Gothic', sans-serif;
    background-color: #f5f5f5;        /* (3) 배경색 속성명 */
    }

    /* ── 헤더 ── */
    header {
    background-color: #2c3e50;
    color: white;          /* (4) 글자색 속성명 */
    text-align: center;
    padding: 60px 20px;
    }

    header h1 {
    font-size: 2.5rem;
    margin-bottom: 10px;
    }

    header p {
    font-size: 1.2rem;
    opacity: 0.8;
    }

    /* ── 네비게이션 ── */
    nav {
    background-color: #34495e;
    padding: 15px;
    }

    nav ul {
    list-style: none;
    display: flex;        /* (5) 가로 배치를 위한 display 값 */
    justify-content: center;
    gap: 30px;
    }

    nav ul li a {
    color: white;
    text-decoration-line: none;           /* (6) 링크 밑줄 제거 속성명 */
    font-size: 1rem;
    }

    /* ── 공통 섹션 ── */
    section {
    max-width: 800px;
    margin: 0 auto;
    padding: 40px 20px;
    }

    section h2 {
    font-size: 1.8rem;
    margin-bottom: 15px;
    color: #2c3e50;
    border-bottom: 3px solid #3498db;  /* (7) 구분선 두께 (예: 3px) */
    padding-bottom: 8px;
    }

    /* ── Skills 섹션 배경 ── */
    #skills {
    background-color: #ecf0f1;  /* (8) 연한 회색 배경색 (#ecf0f1) */
    max-width: 100%;
    padding: 40px;
    }

    #skills h2 {
    max-width: 800px;
    margin: 0 auto 15px auto;
    }

    #skills ul {
    max-width: 800px;
    margin: 0 auto;
    padding-left: 20px;
    }

    #skills ul li {
    margin-bottom: 8px;
    font-size: 1rem;
    }

    /* ── Contact 섹션 ── */
    #contact a {
    color: #3498db;
    text-decoration: none;
    }

    /* ── 푸터 ── */
    footer {
    background-color: #2c3e50;
    color: white;
    text-align: center;          /* (9) 텍스트 가운데 정렬 속성명 */
    padding: 20px;
    font-size: 0.9rem;
    }
    </style>                   
</head>
<body>

<!-- 헤더 -->
<header>
    <h1>김하늘</h1>
    <p>Front-End Developer</p>
</header>

<!-- 네비게이션 -->
<nav>
    <ul>
        <li><a href="#about">About</a></li>
        <li><a href="#skills">Skills</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>
</nav>

<!-- About 섹션 -->
<section id="about">
    <h2>About Me</h2>
    <p>안녕하세요. 저는 사용자 경험을 중요시하는 웹 개발자입니다.<br>
        HTML, CSS, JavaScript를 기반으로 웹 서비스를 제작합니다.</p>
</section>

<!-- Skills 섹션 -->
<section id="skills">
    <h2>My Skills</h2>
    <ul>
        <li>HTML / CSS</li>
        <li>JavaScript</li>
        <li>Java</li>
    </ul>
</section>

<!-- Contact 섹션 -->
<section id="contact">
    <h2>Contact</h2>
    <p>이메일: <a href="mailto:sky@example.com">sky@example.com</a></p>
</section>

<!-- 푸터 -->
<footer>
    <p>&copy; 2025 김하늘. All rights reserved.</p>
</footer>

</body>
</html>
